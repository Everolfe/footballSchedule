spring.application.name=footballMatches
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/football_schedule}
#spring.datasource.url=jdbc:postgresql://db:5432/${DB_NAME}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
server.error.include-message=always
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.hightlight_sql=true
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8081
spring.cache.type=simple

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=false

# ????????? ???? ?????????? Actuator (????? ????? ??????????????)
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,beans,conditions,mappings

# ???????? ?????? health (??? dev ????? full, ??? prod ????? never)
management.endpoint.health.show-details=always

# ???????? ??? ????????? ?? ?????????
management.endpoints.enabled-by-default=true
